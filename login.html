<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>芯 · 登录 / 注册</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="icon" href="icon/黑色单logo.svg" type="image/svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-container">
        <!-- 返回首页链接（确保文件名与首页一致） -->
        <a href="indexn.html" class="back-home"><i class="fas fa-arrow-left"></i> 返回首页</a>

        <!--logo图片-->
        <div class="form-logo">
            <img src="icon/白色带文字.svg" alt="Logo">
        </div>
        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-login">登录</button>
            <button class="tab-btn" id="tab-register">注册</button>
        </div>

        <!-- 登录表单（无验证，无必需属性） -->
        <div id="login-form" class="form-container">
            <form>
                <div class="form-group">
                    <label>邮箱 / 用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="请输入邮箱或用户名">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="请输入密码">
                          <i class="fas fa-eye-slash toggle-password" id="toggle-login"></i>
                    </div>
                </div>
                <div class="extra-links">
                    <label><input type="checkbox" style="accent-color: rgba(165,116,255,0.8);"> 记住我</label>
                    <a href="#">忘记密码？</a>
                </div>
                <button type="submit" class="submit-btn">登 录</button>
            </form>
        </div>

        <!-- 注册表单（无验证，无必需属性） -->
        <div id="register-form" class="form-container hidden">
            <form>
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="昵称或用户名">
                    </div>
                </div>
                <div class="form-group">
                    <label>电子邮箱</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="your@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="至少8位">
                          <i class="fas fa-eye-slash toggle-password" id="toggle-login"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="再次输入密码">
                        <i class="fas fa-eye-slash toggle-password" id="toggle-login"></i>
                    </div>
                </div>
                <div class="terms">
                    点击注册即表示同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
                </div>
                <button type="submit" class="submit-btn">注 册</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // 选项卡切换功能（保留）
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const loginFormDiv = document.getElementById('login-form');
            const registerFormDiv = document.getElementById('register-form');

            function showLogin(updateUrl = true) {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                loginFormDiv.classList.remove('hidden');
                registerFormDiv.classList.add('hidden');
                if (updateUrl) {
                    const url = new URL(window.location);
                    url.searchParams.set('mode', 'login');
                    window.history.replaceState({}, '', url);
                }
            }

            function showRegister(updateUrl = true) {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                registerFormDiv.classList.remove('hidden');
                loginFormDiv.classList.add('hidden');
                if (updateUrl) {
                    const url = new URL(window.location);
                    url.searchParams.set('mode', 'register');
                    window.history.replaceState({}, '', url);
                }
            }

            tabLogin.addEventListener('click', () => showLogin(true));
            tabRegister.addEventListener('click', () => showRegister(true));

            // 根据 URL 参数初始化显示
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            if (mode === 'register') {
                showRegister(false);
            } else {
                showLogin(false);
                if (!mode) {
                    // 清除可能残留的 mode 参数
                    const url = new URL(window.location);
                    if (url.searchParams.has('mode')) {
                        url.searchParams.delete('mode');
                        window.history.replaceState({}, '', url);
                    }
                }
            }

            // ===== 新增：纯静态登录/注册处理 =====
            // 登录表单提交：弹出提示并跳转回首页
            document.querySelector('#login-form form').addEventListener('submit', function(e) {
                e.preventDefault();  // 阻止页面刷新
                alert('登录成功！');
                window.location.href = 'explore.html';  // 跳转回首页（请确保文件名正确）
            });

            // 注册表单提交：弹出提示并跳转回首页
            document.querySelector('#register-form form').addEventListener('submit', function(e) {
                e.preventDefault();
                alert('注册成功！');
                window.location.href = 'indexn.html';
            });
        })();

        // 密码可见性切换
document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function(e) {
        // 获取当前图标前面的 input 元素（图标紧跟在 input 后面）
        const input = this.previousElementSibling;
        if (input && input.type === 'password') {
            input.type = 'text';
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        } else if (input) {
            input.type = 'password';
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        }
    });
});
    </script>
</body>
</html>
