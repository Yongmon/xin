<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>芯 · 登录 / 注册</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="icon" href="icon/黑色单logo.svg" type="image/svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-container">
        <!-- 返回首页链接（确保文件名与首页一致） -->
        <a href="indexn.html" class="back-home"><i class="fas fa-arrow-left"></i> 返回首页</a>

        <!--logo图片-->
        <div class="form-logo">
            <img src="icon/白色带文字.svg" alt="Logo">
        </div>
        <!-- 选项卡 -->
        

        <!-- 登录表单（无验证，无必需属性） -->
        <div id="login-form" class="form-container">
            <form>
                <div class="form-group">
                    <label>邮箱 / 用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="请输入邮箱或用户名">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="请输入密码">
                        <i class="fas fa-eye-slash toggle-password" id="toggle-login"></i>
                    </div>
                </div>
                <div class="extra-links">
                    <label><input type="checkbox" style="accent-color: rgba(165,116,255,0.8);"> 记住我</label>
                    <a href="#">忘记密码？</a>
                </div>
                <button type="submit" class="submit-btn">登 录</button>
            </form>
        </div>
  
    </div>

   <script>
    document.querySelector('#login-form form').addEventListener('submit', function(e) {
    e.preventDefault();
    alert('登录成功！（演示）');
    window.location.href = 'explore.html';
    });
    // 密码可见性切换
document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function(e) {
        // 获取当前图标前面的 input 元素（图标紧跟在 input 后面）
        const input = this.previousElementSibling;
        if (input && input.type === 'password') {
            input.type = 'text';
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        } else if (input) {
            input.type = 'password';
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        }
    });
});
</script>
</body>
</html>
